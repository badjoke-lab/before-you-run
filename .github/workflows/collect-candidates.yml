name: Collect candidates

on:
  workflow_dispatch:
  schedule:
    - cron: '12 3 * * *'

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run candidates:collect:review
      - uses: actions/upload-artifact@v4
        with:
          name: tripwire-candidate-review
          path: |
            data/candidate-review-queue.generated.json
            data/card-drafts.generated.json
            reports/candidate-digest-*.md
            reports/card-drafts.generated.md
            reports/candidate-collection-run-*.md

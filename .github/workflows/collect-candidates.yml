name: Collect candidates

on:
  workflow_dispatch:
  schedule:
    - cron: '12 3 * * *'

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: mkdir -p reports/generated
      - run: node scripts/collect-candidates.mjs data/candidate-sources.json data/candidate-review-queue.generated.json reports/generated/candidate-digest.md reports/generated/candidate-collection-run.md
      - run: node scripts/build-card-drafts.mjs data/candidate-review-queue.generated.json data/card-drafts.generated.json reports/generated/card-drafts.generated.md
      - uses: actions/upload-artifact@v4
        with:
          name: tripwire-candidate-review
          path: |
            data/candidate-review-queue.generated.json
            data/card-drafts.generated.json
            reports/generated/candidate-digest.md
            reports/generated/card-drafts.generated.md
            reports/generated/candidate-collection-run.md
